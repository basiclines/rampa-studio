name: Netlify Production Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install --legacy-peer-deps

      - run: npm run build:dev

      - name: Move React app to /app and copy static site
        run: |
          mkdir -p dist/app
          mv dist/index.html dist/app/
          [ -d dist/assets ] && mv dist/assets dist/app/
          cp -r site/* dist/
          echo '/app/*  /app/index.html  200' > dist/_redirects

      - run: npx netlify deploy --dir=dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROJECT_ID }}
