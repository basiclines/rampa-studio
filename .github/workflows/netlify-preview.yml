name: Netlify Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install --legacy-peer-deps

      - run: npm run build:dev

      - name: Move React app to /app and copy static site
        run: |
          mkdir -p dist/app
          mv dist/index.html dist/app/
          [ -d dist/assets ] && mv dist/assets dist/app/
          cp -r site/* dist/

      - name: Deploy to Netlify
        run: |
          BRANCH="${{ github.head_ref }}"
          ALIAS=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9-]/-/g' | head -c 37)
          npx netlify deploy --dir=dist --alias="$ALIAS" --json > deploy-output.json
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- netlify-preview-comment -->';

            let url;
            try {
              const deploy = JSON.parse(fs.readFileSync('deploy-output.json', 'utf8'));
              url = deploy.deploy_url;
            } catch (e) {
              core.setFailed(`Failed to read deploy output: ${e.message}`);
              return;
            }

            const branch = context.payload.pull_request.head.ref;
            const alias = branch.replace(/[^a-zA-Z0-9-]/g, '-').slice(0, 37);
            const stableUrl = `https://${alias}--rampadesign.netlify.app`;

            const body = `${marker}\n🚀 **Netlify Deploy Preview**\n\n${stableUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => c.body.includes(marker));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
